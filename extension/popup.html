<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 350px;
            padding: 16px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #f8fafc;
            color: #1e293b;
        }

        .popup-container {
            background: #ffffff;
            border-radius: 8px;
            padding: 24px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            border: 1px solid #e2e8f0;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid #e2e8f0;
        }

        .header-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            background-color: #0f172a;
            color: #ffffff;
            border-radius: 6px;
        }

        .header-icon svg {
            width: 18px;
            height: 18px;
            stroke-width: 2.5;
        }

        .header-text h3 {
            font-size: 16px;
            color: #0f172a;
            margin: 0;
            font-weight: 700;
            letter-spacing: -0.01em;
        }

        .header-text p {
            font-size: 12px;
            color: #64748b;
            margin: 0;
            font-weight: 500;
        }

        #stateInfo {
            margin-bottom: 16px;
        }

        .state-badge {
            background-color: #f1f5f9;
            color: #334155;
            padding: 10px 14px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid #e2e8f0;
        }

        .state-badge .state-value {
            color: #0f172a;
            font-weight: 700;
        }

        .applicant-info {
            background: #ffffff;
            border-radius: 6px;
            padding: 1 ৬;
            margin-bottom: 20px;
            border: 1px solid #e2e8f0;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            border-bottom: 1px solid #f1f5f9;
        }
        
        .info-row:last-child {
            border-bottom: none;
        }

        .info-label {
            font-size: 12px;
            color: #64748b;
            font-weight: 500;
        }

        .info-value {
            font-size: 13px;
            color: #0f172a;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .file-badge {
            background: #f0fdf4;
            color: #166534;
            border: 1px solid #bbf7d0;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
        }

        .no-data {
            text-align: center;
            padding: 32px 16px;
            background: #f8fafc;
            border-radius: 6px;
            border: 1px dashed #cbd5e1;
            margin-bottom: 24px;
        }

        .no-data svg {
            width: 24px;
            height: 24px;
            color: #94a3b8;
            margin-bottom: 12px;
        }

        .no-data p {
            color: #334155;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .no-data small {
            color: #64748b;
            font-size: 12px;
            display: block;
            line-height: 1.5;
        }

        .buttons {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .main-button {
            background-color: #0f172a;
            color: #ffffff;
            border: 1px solid #0f172a;
            padding: 12px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s ease-in-out;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .main-button:hover:not(:disabled) {
            background-color: #1e293b;
            border-color: #1e293b;
        }

        .main-button:active:not(:disabled) {
            transform: translateY(1px);
        }

        .main-button:disabled {
            background-color: #94a3b8;
            border-color: #94a3b8;
            cursor: not-allowed;
            opacity: 0.8;
        }

        .main-button svg {
            width: 16px;
            height: 16px;
        }

        .secondary-buttons {
            display: flex;
            gap: 10px;
        }

        .secondary-btn {
            flex: 1;
            background: #ffffff;
            color: #334155;
            border: 1px solid #cbd5e1;
            padding: 10px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
        }

        .secondary-btn:hover {
            background: #f8fafc;
            border-color: #94a3b8;
        }

        #fillBtn, #clearBtn {
            display: none;
        }

        .error {
            color: #b91c1c;
            background: #fef2f2;
            border: 1px solid #fecaca;
            padding: 12px;
            border-radius: 6px;
            font-size: 12px;
            margin-top: 16px;
            display: flex;
            align-items: flex-start;
            gap: 8px;
        }

        .error svg {
            width: 14px;
            height: 14px;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .footer {
            margin-top: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .footer p {
            font-size: 11px;
            color: #94a3b8;
            font-weight: 500;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background-color: #22c55e;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="popup-container">
        <div class="header">
            <div class="header-icon">
                <svg xmlns="http://www.w3.org/Formitra" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                    <polyline points="14 2 14 8 20 8"></polyline>
                    <line x1="16" y1="13" x2="8" y2="13"></line>
                    <line x1="16" y1="17" x2="8" y2="17"></line>
                    <polyline points="10 9 9 9 8 9"></polyline>
                </svg>
            </div>
            <div class="header-text">
                <h3>Formitra AI</h3>
                <p>Enterprise Automation</p>
            </div>
        </div>

        <div id="contentArea">
            <div class="no-data">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <p>No Application Data</p>
                <small>Navigate to the Formitra client application and select "Import" to securely transfer your records.</small>
            </div>
        </div>

        <div class="buttons">
            <button id="importBtn" class="main-button">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="7 10 12 15 17 10"></polyline>
                    <line x1="12" y1="15" x2="12" y2="3"></line>
                </svg>
                Import Local Data
            </button>
            <button id="fillBtn" class="main-button">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="20 6 9 17 4 12"></polyline>
                </svg>
                Execute Auto-Fill
            </button>
            <div class="secondary-buttons">
                <button id="clearBtn" class="secondary-btn">Clear Secure Storage</button>
            </div>
        </div>

        <div class="footer">
            <p><span class="status-dot"></span> System Connected</p>
        </div>
    </div>
    <script src="popup.js"></script>
</body>
</html>
